<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>nocapCrunch - No Cappin Just Crunchin</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Navigation Header -->
    <header class="header">
        <div class="container">
            <div class="header-content">
                <div class="logo">
                    <img src="assets/logo.svg" alt="nocapCrunch" class="logo-image">
                </div>
                <button class="cart-toggle" id="cartToggle">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="9" cy="21" r="1"></circle>
                        <circle cx="20" cy="21" r="1"></circle>
                        <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
                    </svg>
                    <span class="cart-badge" id="cartBadge">0</span>
                </button>
            </div>
        </div>
    </header>

    <!-- Hero Section -->
    <section class="hero">
        <div class="hero-background">
            <img src="assets/hero.png" alt="nocapCrunch Hero" class="hero-image">
        </div>
        <div class="container">
            <div class="hero-content">
                 <div class="logo">
                    <img src="assets/logo_white.svg" alt="nocapCrunch" class="logo_hero-image">
                </div>
                <p class="hero-tagline">no cappin just crunchin experience</p>
                <button class="cta-button" onclick="document.getElementById('menu').scrollIntoView({behavior: 'smooth'})">
                    Order Now
                </button>
            </div>
        </div>
    </section>

    <!-- Menu Section -->
    <section class="menu-section" id="menu">
        <div class="container">
            <h2 class="section-title">Menu</h2>
            
            <!-- Street Snacks Category -->
            <div class="menu-category">
                <h3 class="category-title">Street Snacks</h3>
                <div class="menu-grid" id="streetSnacksGrid">
                    <!-- Items will be populated by JavaScript -->
                </div>
            </div>

            <!-- Cold Drinks Category -->
            <div class="menu-category">
                <h3 class="category-title">Cold Drinks</h3>
                <div class="menu-grid" id="coldDrinksGrid">
                    <!-- Items will be populated by JavaScript -->
                </div>
            </div>
        </div>
    </section>

    <!-- Cart Drawer (Slide-in) -->
    <div class="cart-drawer" id="cartDrawer">
        <div class="cart-header">
            <h3>Your Order</h3>
            <button class="close-cart" id="closeCartBtn">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="18" y1="6" x2="6" y2="18"></line>
                    <line x1="6" y1="6" x2="18" y2="18"></line>
                </svg>
            </button>
        </div>

        <div class="cart-items-container" id="cartItemsContainer">
            <p class="empty-cart-message">Your cart is empty</p>
        </div>

        <div class="cart-footer">
            <div class="cart-total">
                <span>Total:</span>
                <span class="total-price" id="totalPrice">Rs 0</span>
            </div>
            <button class="place-order-btn" id="placeOrderBtn" disabled>
                Place Order
            </button>
        </div>
    </div>

    <!-- Cart Overlay -->
    <div class="cart-overlay" id="cartOverlay"></div>

    <!-- Modal for Order Details -->
    <div class="modal" id="orderModal">
        <div class="modal-content">
            <button class="modal-close" id="modalCloseBtn">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="18" y1="6" x2="6" y2="18"></line>
                    <line x1="6" y1="6" x2="18" y2="18"></line>
                </svg>
            </button>
            <h2>Complete Your Order</h2>
            <form id="orderForm">
                <div class="form-group">
                    <label for="customerName">Name *</label>
                    <input type="text" id="customerName" required placeholder="Enter your name">
                </div>
                <div class="form-group">
                    <label for="customerPhone">Phone Number *</label>
                    <input type="tel" id="customerPhone" required placeholder="Enter your WhatsApp number">
                </div>
                <div class="form-group">
                    <label for="customerAddress">Address *</label>
                    <textarea id="customerAddress" required placeholder="Enter your delivery address"></textarea>
                </div>
                <div class="order-summary">
                    <h3>Order Summary</h3>
                    <div id="orderSummary"></div>
                    <div class="summary-total">
                        <span>Total:</span>
                        <span id="summaryTotal">Rs 0</span>
                    </div>
                </div>
                <button type="submit" class="submit-order-btn">Send Order via WhatsApp</button>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
